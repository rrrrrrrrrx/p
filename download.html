<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download — Prophet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <canvas id="bg-canvas"></canvas>

  <nav id="main-nav">
    <a href="index.html" class="logo">Prophet<span>.</span></a>
    <ul class="nav-links">
      <li><a href="index.html#features">Features</a></li>
      <li><a href="download.html">Download</a></li>
      <li><a href="index.html#faq">FAQ</a></li>
      <li><a href="index.html" class="nav-cta">Home</a></li>
    </ul>
  </nav>

  <main class="dl-page-main">
    <h1 class="dl-page-title reveal">Download</h1>

    <div class="dl-card dl-card--simple reveal">
      <div class="dl-row">
        <span class="dl-label">Version</span>
        <span class="dl-value" id="dl-version">—</span>
      </div>
      <p class="dl-line" id="dl-status"></p>
      <div class="dl-actions dl-actions--single">
        <a id="dl-button" class="plan-cta" href="#">Download</a>
      </div>
      <div class="dl-manifest">
        <span class="dl-manifest-label">update.json</span>
        <code class="dl-manifest-url" id="dl-manifest-url"></code>
      </div>
    </div>
  </main>

  <footer class="dl-page-footer">
    <a href="index.html" class="footer-logo">Prophet<span>.</span></a>
    <span class="footer-copy">© 2025 Prophet™</span>
  </footer>

  <script src="main.js"></script>
  <script>
    (function () {
      var elVer = document.getElementById('dl-version');
      var elBtn = document.getElementById('dl-button');
      var elStatus = document.getElementById('dl-status');
      var elManifest = document.getElementById('dl-manifest-url');
      var base = window.location.href.replace(/[^/]*$/, '');
      elManifest.textContent = base + 'update.json';
      elStatus.textContent = 'Loading version…';

      fetch('update.json?t=' + Date.now(), { cache: 'no-store' })
        .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
        .then(function (j) {
          elVer.textContent = j.version || '—';
          var url = (j.download_url || '').trim();
          if (url) {
            elBtn.href = url;
            elStatus.textContent = j.sha256
              ? 'SHA-256: ' + j.sha256
              : ' ';
          } else {
            elBtn.href = '#';
            elStatus.textContent = 'Add download_url in update.json.';
            elBtn.addEventListener('click', function (e) { e.preventDefault(); });
          }
        })
        .catch(function () {
          elVer.textContent = '—';
          elStatus.textContent = 'Could not load update.json (use http/https hosting).';
          elBtn.href = '#';
          elBtn.addEventListener('click', function (e) { e.preventDefault(); });
        });
    })();
  </script>
</body>
</html>
